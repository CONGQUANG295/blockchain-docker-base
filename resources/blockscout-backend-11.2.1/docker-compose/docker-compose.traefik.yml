version: '3.9'

# Blockscout 11.2.1 + frontend 2.8.1 with Traefik (no nginx proxy).
#
# Setup:
#   ./scripts/prepare-traefik.sh
#   vim envs/traefik.env envs/common-frontend.env
#   docker compose -f docker-compose.traefik.yml up -d --build

services:
  traefik:
    extends:
      file: ./services/traefik.yml
      service: traefik

  redis-db:
    extends:
      file: ./services/redis.yml
      service: redis-db
    networks:
      - blockscout-proxy

  db-init:
    extends:
      file: ./services/db.yml
      service: db-init

  db:
    depends_on:
      db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/db.yml
      service: db
    ports: !override []
    networks:
      - blockscout-proxy

  backend:
    depends_on:
      - db
      - redis-db
    extends:
      file: ./services/backend-local.yml
      service: backend
    links:
      - db:database
    environment:
      ETHEREUM_JSONRPC_HTTP_URL: ${ETHEREUM_JSONRPC_HTTP_URL:-http://host.docker.internal:8545/}
      ETHEREUM_JSONRPC_TRACE_URL: ${ETHEREUM_JSONRPC_TRACE_URL:-http://host.docker.internal:8545/}
      ETHEREUM_JSONRPC_WS_URL: ${ETHEREUM_JSONRPC_WS_URL:-ws://host.docker.internal:8545/}
      CHAIN_ID: ${CHAIN_ID:-1337}
      ETHEREUM_JSONRPC_VARIANT: ${ETHEREUM_JSONRPC_VARIANT:-geth}
      BLOCK_TRANSFORMER: ${BLOCK_TRANSFORMER:-base}
    expose:
      - 4000
    networks:
      - blockscout-proxy

  frontend:
    depends_on:
      - backend
    extends:
      file: ./services/frontend-local.yml
      service: frontend
    env_file:
      - ./envs/common-frontend.env
    expose:
      - 3000
    networks:
      - blockscout-proxy

  visualizer:
    extends:
      file: ./services/visualizer.yml
      service: visualizer
    expose:
      - 8050
    networks:
      - blockscout-proxy

  sig-provider:
    extends:
      file: ./services/sig-provider.yml
      service: sig-provider
    networks:
      - blockscout-proxy

  stats-db-init:
    extends:
      file: ./services/stats.yml
      service: stats-db-init

  stats-db:
    depends_on:
      stats-db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/stats.yml
      service: stats-db
    ports: !override []
    networks:
      - blockscout-proxy

  stats:
    depends_on:
      - stats-db
      - backend
    extends:
      file: ./services/stats.yml
      service: stats
    expose:
      - 8050
    networks:
      - blockscout-proxy

  user-ops-indexer:
    depends_on:
      - db
      - backend
    extends:
      file: ./services/user-ops-indexer.yml
      service: user-ops-indexer
    networks:
      - blockscout-proxy

  nft_media_handler:
    depends_on:
      - backend
    extends:
      file: ./services/backend-local.yml
      service: nft_media_handler
    networks:
      - blockscout-proxy

networks:
  blockscout-proxy:
    name: blockscout-proxy
